<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#E9E3D6">
<title>We 家計簿</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家計簿">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">WE <b>家計簿</b></div>
    <div class="lastmod" id="lastmod"></div>
  </header>

  <nav class="month">
    <span class="mside"></span>
    <div class="mnav">
      <button id="prev" aria-label="前の月">‹</button>
      <h1 id="monthlabel">—</h1>
      <button id="next" aria-label="次の月">›</button>
    </div>
    <div class="topicons">
      <button class="iconbtn" id="btn-export" title="バックアップ（JSON）" aria-label="バックアップ">
        <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      </button>
      <button class="iconbtn" id="btn-settings" title="設定" aria-label="設定">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12c0-.4 0-.7-.1-1.1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.9-1.1L14.4 2H9.6l-.4 2.8a7 7 0 0 0-1.9 1.1l-2.3-1-2 3.4 2 1.5C5 11.3 5 11.6 5 12s0 .7.1 1.1l-2 1.5 2 3.4 2.3-1c.6.5 1.2.8 1.9 1.1l.4 2.8h4.8l.4-2.8c.7-.3 1.3-.6 1.9-1.1l2.3 1 2-3.4-2-1.5c.1-.4.1-.7.1-1.1z"/></svg>
      </button>
    </div>
  </nav>

  <section class="view on" id="v-overview"></section>
  <section class="view" id="v-entry"></section>
  <section class="view" id="v-stats"></section>
  <section class="view" id="v-history"></section>
</div>

<nav class="tabbar">
  <div class="tabind"></div>
  <button class="tab on" data-v="overview"><svg viewBox="0 0 24 24"><path d="M4 11.5 12 5l8 6.5"/><path d="M6 10.2V19h12v-8.8"/></svg><span>概要</span></button>
  <button class="tab" data-v="entry"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1L19 8.5a2.1 2.1 0 0 0-3-3L5.5 16 4 20z"/><path d="M14.5 7l3 3"/></svg><span>記帳</span></button>
  <button class="tab" data-v="stats"><svg viewBox="0 0 24 24"><path d="M5 4v16h15"/><path d="M9 20v-5M14 20v-9M19 20v-3"/></svg><span>統計</span></button>
  <button class="tab" data-v="history"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4.2l3 1.8"/></svg><span>履歴</span></button>
</nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet" role="dialog" aria-modal="true"></div></div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/compute.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script src="js/sync.js"></script>
</body>
</html>
